<template>
    <lightning-modal-header label="Product Summary"></lightning-modal-header>
    <lightning-modal-body>
        <div class="slds-is-relative">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="medium" style="z-index: 9100;"></lightning-spinner>
            </template>
            <div class="slds-p-horizontal_medium">
                <lightning-datatable
                    key-field="product2Id"
                    data={orderItems}
                    columns={orderColumns}
                    class="slds-m-top_medium"
                    oncellchange={handleSummaryInputChange}
                    draft-values={draftValues}
                    hide-checkbox-column
                    suppress-bottom-bar
                >
                </lightning-datatable>
                <div class="slds-grid slds-grid_align-end">
                    <p class="slds-m-bottom_small slds-col">
                        Total Price: {totalPrice}
                    </p>
                </div>
            </div>
            <template if:true={error}>
                <p class="slds-text-color_error">{error.body.message}</p>
            </template>
        </div>
    </lightning-modal-body>
    <lightning-modal-footer>
        <lightning-button
            class="slds-button"
            variant="neutral"
            label="Cancel"
            onclick={handleDismiss}
        ></lightning-button>
        <lightning-button
            class="slds-button slds-m-left_x-small"
            variant="brand"
            label="Create Order"
            onclick={handleCreateButton}
        ></lightning-button>
    </lightning-modal-footer>
</template>
